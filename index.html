<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>მენტალისტი: წითელი ძაფები</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- ფონი -->
        <div id="background" class="background"></div>

        <!-- პერსონაჟის პორტრეტი -->
        <div id="character" class="character"></div>

        <!-- დიალოგის ყუთი -->
        <div class="dialogue-box">
            <div id="speaker" class="speaker"></div>
            <div id="dialogue" class="dialogue"></div>
        </div>

        <!-- არჩევანი -->
        <div id="choices" class="choices"></div>

        <!-- Lisbon Meter -->
        <div class="meter-container">
            <div class="meter-label">ლისბონის მოთმინება</div>
            <div class="meter">
                <div id="lisbon-meter" class="meter-fill"></div>
            </div>
        </div>

        <!-- სათაური -->
        <div id="scene-title" class="scene-title"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
